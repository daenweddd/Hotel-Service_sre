version: "3.8"

services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - hotel-service
      - room-service
      - booking-service
      - payment-service
      - notification-service
      - user-service

  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"

  hotel-service:
    build: ./services/hotel-service
    ports:
      - "5002:5002"

  room-service:
    build: ./services/room-service
    ports:
      - "5003:5003"

  booking-service:
    build: ./services/booking-service
    ports:
      - "5004:5004"
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres

  payment-service:
    build: ./services/payment-service
    ports:
      - "5005:5005"

  notification-service:
    build: ./services/notification-service
    ports:
      - "5006:5006"
    environment:
      MONGO_HOST: mongodb
    depends_on:
      - mongodb

  user-service:
    build: ./services/user-service
    ports:
      - "5007:5007"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_pass
      POSTGRES_DB: hotel_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    redis:
     image: redis:7-alpine
     ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
    ports:
      - "9090:9090"
    depends_on:
      - auth-service
      - hotel-service
      - room-service
      - booking-service
      - payment-service
      - notification-service
      - user-service

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mongodb_data: