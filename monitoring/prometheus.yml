global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:5001"]

  - job_name: "hotel-service"
    static_configs:
      - targets: ["hotel-service:5002"]

  - job_name: "room-service"
    static_configs:
      - targets: ["room-service:5003"]

  - job_name: "booking-service"
    static_configs:
      - targets: ["booking-service:5004"]

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:5005"]

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:5006"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:5007"]